<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naveen Foods</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #8BC34A, #4CAF50);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .home-box {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 15px;
            width: 320px;
            text-align: center;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 30px;
            color: #333;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px auto;   
            text-decoration: none;
            background: #3f9c91;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;  
            box-sizing: border-box; 
        }

        .btn:hover {
            background: #357f76;
        }
    </style>
</head>

<body>
    <div class="home-box">
        <h2>Welcome to Naveen-Foods</h2>
        <a href="signin/" class="btn">SIGN IN</a>
        <a href="signup/" class="btn">SIGN UP</a>
    </div>

</body>
</html>
