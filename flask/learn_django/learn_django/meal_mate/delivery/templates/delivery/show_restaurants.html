<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurants</title>

    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #8BC34A, #4CAF50);

            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .main-box {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 1000px;
            margin-top: 30px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #222;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.6);
            border-radius: 10px;
            overflow: hidden;
        }

        thead {
            background: #3f9c91;
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        tbody tr:nth-child(even) {
            background: rgba(255,255,255,0.4);
        }

        img {
            border-radius: 8px;
        }

        .action-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .btn {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            color: white;
            font-size: 13px;
            background: #3f9c91;
        }

        .btn:hover {
            background: #357f76;
        }

        .update-btn {
            background: #f39c12;
        }

        .update-btn:hover {
            background: #d68910;
        }

        .delete-btn {
            background: #e74c3c;
            border: none;
            cursor: pointer;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        form {
            margin: 0;
        }
    </style>
</head>

<body>

<div class="main-box">

    <h1>My Favourite Restaurants</h1>

    <table>
        <thead>
            <tr>
                <th>Picture</th>
                <th>Name</th>
                <th>Cuisine</th>
                <th>Rating</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
            {% for restaurant in restaurants %}
            <tr>
                <td>
                    <img src="{{restaurant.picture}}" alt="picture of {{restaurant.name}}" width="80">
                </td>
                <td>{{ restaurant.name }}</td>
                <td>{{ restaurant.cuisine }}</td>
                <td>{{ restaurant.rating }}/5</td>
                <td>
                    <div class="action-box">
                        <a href="{% url 'restaurant_menu' restaurant.id %}" class="btn">
                            View Menu
                        </a>

                        <a href="{% url 'update_restaurant_page' restaurant.id %}" class="btn update-btn">
                            Update Restaurant
                        </a>

                        <form method="POST" action="{% url 'delete_restaurant' restaurant.id %}">
                            {% csrf_token %}
                            <button type="submit" class="btn delete-btn"
                            onclick="return confirm('Are you sure you want to delete this restaurant?')">
                                Delete
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
