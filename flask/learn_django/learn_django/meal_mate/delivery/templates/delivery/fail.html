<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Failed</title>
    {% load static %}
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #e74c3c;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background-color: #f1948a;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 350px;
            position: relative;
        }

        .icon {
            width: 80px;
            height: 80px;
            background-color: #c0392b;
            border-radius: 50%;
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 40px;
        }

        h1 {
            margin-top: 50px;
            color: #2c3e50;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .btn {
            display: block;
            margin: 30px auto 0;
            padding: 12px;
            width: 80%;
            background-color: #c0392b;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #922b21;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">✖</div>
        <h1>LOGIN FAILED</h1>

        <a href="/" class="btn">Go to Home</a>
    </div>

</body>
</html>
