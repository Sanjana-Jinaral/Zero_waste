<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #8BC34A, #4CAF50);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-box {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 800px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1, h2, h3 {
            margin: 10px 0;
            color: #222;
        }

        .error {
            color: #e74c3c;
            font-weight: bold;
            margin: 15px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: rgba(255,255,255,0.6);
            border-radius: 10px;
            overflow: hidden;
        }

        thead {
            background: #3f9c91;
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        tbody tr:nth-child(even) {
            background: rgba(255,255,255,0.4);
        }

        img {
            border-radius: 8px;
        }

        .btn {
            margin-top: 15px;
            padding: 10px 16px;
            background: #3f9c91;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        .btn:hover {
            background: #357f76;
        }
    </style>
</head>

<body>

<div class="main-box">

    <h1>Checkout</h1>
    <h2>Welcome : {{username}}</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% else %}

    <table>
        <thead>
            <tr>
                <th>Image</th>
                <th>Item</th>
                <th>Price</th>
            </tr>
        </thead>

        <tbody>
            {% for item in cart_items %}
            <tr>
                <td>
                    <img src="{{ item.picture }}" width="70">
                </td>
                <td>{{ item.name }}</td>
                <td>₹ {{ item.price }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <h3>Total Price: ₹ {{ total_price }}</h3>

    <form method="POST" action="{% url 'orders' username %}">
        {% csrf_token %}
        <button type="submit" class="btn">Place Order</button>
    </form>

    {% endif %}

</div>

</body>
</html>
