{% extends 'base.html' %}
{% block title %}Login — ZeroWasteChain{% endblock %}
{% block content %}
<div class="auth-body">
<div class="auth-card">
    <div class="auth-logo">
        <div class="icon">♻️</div>
        <h1>Zero<span>Waste</span>Chain</h1>
        <p>Sign in to your account</p>
    </div>
    {% if error %}<div class="toast toast-error" style="animation:none;margin-bottom:16px;">❌ {{ error }}</div>{% endif %}
    <form method="POST" action="/login">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-green" style="width:100%;justify-content:center;padding:11px;">Sign In →</button>
    </form>
    <div class="divider">or</div>
    <p style="text-align:center;font-size:0.88rem;color:#64748b;">
        Don't have an account? <a href="/register" style="color:var(--green);font-weight:600;">Register here</a>
    </p>
    <p style="text-align:center;font-size:0.78rem;color:#94a3b8;margin-top:16px;">
        Admin: admin@zerowaste.com / admin123
    </p>
</div>
</div>
{% endblock %}
