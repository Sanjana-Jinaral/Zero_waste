{% extends 'base.html' %}
{% block title %}Add Food Listing{% endblock %}
{% block content %}
<div class="page" style="max-width:700px;">
    <div class="page-header">
        <div>
            <h1>➕ Add Food Listing</h1>
            <p>List your surplus food for NGOs to claim</p>
        </div>
        <a href="/donor" class="btn btn-ghost">← Back</a>
    </div>
    <div class="card">
        <div class="card-body">
        <form method="POST" action="/donor/add">
            <div class="form-grid">
                <div class="form-group" style="grid-column:1/-1;">
                    <label>Food Title *</label>
                    <input type="text" name="title" class="form-control" placeholder="e.g. Leftover Biryani, Fresh Bread" required>
                </div>
                <div class="form-group" style="grid-column:1/-1;">
                    <label>Description</label>
                    <textarea name="description" class="form-control" rows="2" placeholder="Any details about the food, packaging, etc."></textarea>
                </div>
                <div class="form-group">
                    <label>Category *</label>
                    <select name="category" class="form-control" required>
                        <option value="">Select category</option>
                        <option>Cooked Food</option>
                        <option>Bakery</option>
                        <option>Fruits & Vegetables</option>
                        <option>Dairy</option>
                        <option>Packaged</option>
                        <option>Beverages</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Expiry Date & Time *</label>
                    <input type="datetime-local" name="expiry_time" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Quantity *</label>
                    <input type="number" name="quantity" class="form-control" placeholder="10" required min="0.1" step="0.1">
                </div>
                <div class="form-group">
                    <label>Unit</label>
                    <select name="unit" class="form-control">
                        <option value="kg">kg</option>
                        <option value="litres">litres</option>
                        <option value="packets">packets</option>
                        <option value="boxes">boxes</option>
                        <option value="servings">servings</option>
                    </select>
                </div>
                <div class="form-group" style="grid-column:1/-1;">
                    <label>Pickup Address *</label>
                    <input type="text" name="pickup_address" class="form-control" placeholder="Full address for pickup" required>
                </div>
                <div class="form-group">
                    <label>City *</label>
                    <input type="text" name="city" class="form-control" placeholder="Mumbai" required>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-green">🚀 Post Listing</button>
                <a href="/donor" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
        </div>
    </div>
</div>
{% endblock %}
