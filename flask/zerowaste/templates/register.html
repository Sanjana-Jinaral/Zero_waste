{% extends 'base.html' %}
{% block title %}Register — ZeroWasteChain{% endblock %}
{% block content %}
<div class="auth-body">
<div class="auth-card" style="max-width:540px;">
    <div class="auth-logo">
        <div class="icon">♻️</div>
        <h1>Join <span>ZeroWasteChain</span></h1>
        <p>Create your account and start making an impact</p>
    </div>
    <form method="POST" action="/register">
        <p style="font-size:0.82rem;font-weight:600;color:#334155;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:10px;">I am a...</p>
        <div class="role-grid">
            <div>
                <input type="radio" name="role" id="r-donor" value="donor" class="role-option" required>
                <label for="r-donor" class="role-label"><span class="icon">🍽️</span>Donor</label>
            </div>
            <div>
                <input type="radio" name="role" id="r-ngo" value="ngo" class="role-option">
                <label for="r-ngo" class="role-label"><span class="icon">🏢</span>NGO</label>
            </div>
            <div>
                <input type="radio" name="role" id="r-vol" value="volunteer" class="role-option">
                <label for="r-vol" class="role-label"><span class="icon">🚴</span>Volunteer</label>
            </div>
            <div>
                <input type="radio" name="role" id="r-admin" value="admin" class="role-option">
                <label for="r-admin" class="role-label"><span class="icon">🛡️</span>Admin</label>
            </div>
        </div>
        <div class="form-grid">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" name="name" class="form-control" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" class="form-control" placeholder="+91 9876543210">
            </div>
            <div class="form-group">
                <label>Password *</label>
                <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required minlength="6">
            </div>
            <div class="form-group">
                <label>Organization Name</label>
                <input type="text" name="org_name" class="form-control" placeholder="Hotel / NGO name">
            </div>
            <div class="form-group">
                <label>City *</label>
                <input type="text" name="city" class="form-control" placeholder="Mumbai" required>
            </div>
        </div>
        <div class="form-group">
            <label>Address</label>
            <input type="text" name="address" class="form-control" placeholder="Street, Area">
        </div>
        <button type="submit" class="btn btn-green" style="width:100%;justify-content:center;padding:11px;margin-top:6px;">Create Account →</button>
    </form>
    <div class="divider">or</div>
    <p style="text-align:center;font-size:0.88rem;color:#64748b;">
        Already have an account? <a href="/login" style="color:var(--green);font-weight:600;">Sign in</a>
    </p>
</div>
</div>
{% endblock %}
