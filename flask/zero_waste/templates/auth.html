<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | Zero Waste Chain</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-light);
            padding: 40px 20px;
        }
        .auth-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-color);
        }
        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #e5e7eb;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            transition: 0.3s;
        }
        .auth-tab.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            margin-bottom: -2px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
        }
        .btn-auth {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-auth:hover {
            background: var(--primary-hover);
        }
        .form-section {
            display: none;
        }
        .form-section.active {
            display: block;
        }
        .error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-logo">Zero Waste Chain</div>
            
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Log In</div>
                <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Sign Up</div>
            </div>

            <div id="error-message" class="error-msg"></div>

            <form id="form-login" class="form-section active">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" class="form-control" required>
                </div>
                <button type="submit" class="btn-auth">Log In</button>
            </form>

            <form id="form-register" class="form-section">
                <div class="form-group">
                    <label>Full Name or Organization Name</label>
                    <input type="text" id="reg-name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reg-email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="reg-phone" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Full Address</label>
                    <input type="text" id="reg-address" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>I am a...</label>
                    <select id="reg-role" class="form-control" required>
                        <option value="donor">Food Donor (Restaurant, Grocery)</option>
                        <option value="ngo">NGO / Charity</option>
                        <option value="volunteer">Volunteer</option>
                    </select>
                </div>
                <button type="submit" class="btn-auth">Create Account</button>
            </form>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
            document.getElementById('error-message').style.display = 'none';
            
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('form-' + tab).classList.add('active');
        }

        // Handle Login
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Redirect based on role
                    if (data.user.role === 'donor') window.location.href = '/donor';
                    else if (data.user.role === 'ngo') window.location.href = '/ngo';
                    else if (data.user.role === 'volunteer') window.location.href = '/volunteer';
                    else window.location.href = '/';
                } else {
                    showError(data.message);
                }
            } catch (err) {
                showError("Connection error.");
            }
        });

        // Handle Register
        document.getElementById('form-register').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const phone = document.getElementById('reg-phone').value;
            const address = document.getElementById('reg-address').value;
            const role = document.getElementById('reg-role').value;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, phone, address, role })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    if (data.user.role === 'donor') window.location.href = '/donor';
                    else if (data.user.role === 'ngo') window.location.href = '/ngo';
                    else if (data.user.role === 'volunteer') window.location.href = '/volunteer';
                    else window.location.href = '/';
                } else {
                    showError(data.message);
                }
            } catch (err) {
                showError("Connection error.");
            }
        });

        function showError(msg) {
            const errEl = document.getElementById('error-message');
            errEl.textContent = msg;
            errEl.style.display = 'block';
        }
    </script>
</body>
</html>
