{% extends "base.html" %}

{% block title %}Register - Zero Waste Chain{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 2rem auto;">
    <div class="card">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">Join the Chain</h2>
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Role</label>
                <select name="role" class="form-control" id="role-select" required>
                    <option value="donor">Food Donor (Restaurant/Grocer)</option>
                    <option value="ngo">NGO (Charity/Food Bank)</option>
                    <option value="volunteer">Volunteer (Delivery Partner)</option>
                </select>
            </div>
            
            <div id="org-fields">
                <div class="form-group">
                    <label>Organization Name</label>
                    <input type="text" name="organization_name" class="form-control">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" name="address" class="form-control">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
        </form>
    </div>
</div>

<script>
    const roleSelect = document.getElementById('role-select');
    const orgFields = document.getElementById('org-fields');
    
    roleSelect.addEventListener('change', () => {
        if (roleSelect.value === 'volunteer') {
            orgFields.style.display = 'none';
        } else {
            orgFields.style.display = 'block';
        }
    });
</script>
{% endblock %}
