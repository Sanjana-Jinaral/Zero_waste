{% extends "base.html" %}

{% block title %}Login - Zero Waste Chain{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">Welcome Back</h2>
        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>
        <p style="margin-top: 1rem; text-align: center; color: var(--text-muted);">
            Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a>
        </p>
    </div>
</div>
{% endblock %}
